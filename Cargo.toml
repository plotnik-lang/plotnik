[workspace]
resolver = "2"
members = [
    "crates/plotnik-bytecode",
    "crates/plotnik-analyze",
    "crates/plotnik-cli",
    "crates/plotnik-compile",
    "crates/plotnik-compiler",
    "crates/plotnik-core",
    "crates/plotnik-diagnostics",
    "crates/plotnik-emit",
    "crates/plotnik-ir",
    "crates/plotnik-lib",
    "crates/plotnik-parser",
    "crates/plotnik-query",
    "crates/plotnik-typegen",
    "crates/plotnik-vm",
]

[workspace.package]
version = "0.3.3"
license = "Apache-2.0"
repository = "https://github.com/plotnik-lang/plotnik"
edition = "2024"

[workspace.dependencies]
plotnik-bytecode = { path = "crates/plotnik-bytecode", version = "0.3.3" }
plotnik-analyze = { path = "crates/plotnik-analyze", version = "0.3.3" }
plotnik-compile = { path = "crates/plotnik-compile", version = "0.3.3" }
plotnik-compiler = { path = "crates/plotnik-compiler", version = "0.3.3" }
plotnik-core = { path = "crates/plotnik-core", version = "0.3.3" }
plotnik-diagnostics = { path = "crates/plotnik-diagnostics", version = "0.3.3" }
plotnik-emit = { path = "crates/plotnik-emit", version = "0.3.3" }
plotnik-ir = { path = "crates/plotnik-ir", version = "0.3.3" }
plotnik-lib = { path = "crates/plotnik-lib", version = "0.3.3" }
plotnik-parser = { path = "crates/plotnik-parser", version = "0.3.3" }
plotnik-query = { path = "crates/plotnik-query", version = "0.3.3" }
plotnik-typegen = { path = "crates/plotnik-typegen", version = "0.3.3" }
plotnik-vm = { path = "crates/plotnik-vm", version = "0.3.3" }

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }

[workspace.lints.clippy]
unwrap_used = "deny"

# Keep arithmetic overflow/underflow loud in release, not just debug: a wrap that
# breaks an internal invariant must crash (the same discipline as panic!/.expect()),
# never silently corrupt downstream offsets/indices.
[profile.release]
overflow-checks = true
