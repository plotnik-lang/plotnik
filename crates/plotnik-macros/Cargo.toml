[package]
name = "plotnik-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Proc-macro backend for plotnik - compile tree-sitter queries to typed Rust"
documentation = "https://docs.rs/plotnik-macros"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "ast", "proc-macro"]
categories = ["development-tools", "parsing"]
include = ["src/**/*", "Cargo.toml"]

[lints]
workspace = true

[lib]
proc-macro = true

[features]
# Emit `SerializeWithSource` impls for generated output types. Feature, not a
# macro argument: it must be on iff the runtime's `serde` feature is on, and
# the `plotnik` facade forwards both from one flag.
serde = []

[dependencies]
cargo_metadata = "0.23"
crc32fast = "1.4"
litrs = "1.0"
plotnik-lib = { path = "../plotnik-lib", version = "0.4.0", default-features = false }
plotnik-rt = { workspace = true }
serde_json = "1"
