[package]
name = "plotnik-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "WebAssembly bindings for Plotnik"
publish = false
include = ["src/**/*", "build.rs", "Cargo.toml"]

[lib]
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[features]
default = ["lang-javascript", "lang-typescript"]
lang-javascript = ["dep:arborium-javascript"]
lang-typescript = ["dep:arborium-typescript"]

[dependencies]
arborium-javascript = { version = "2.18.0", optional = true }
arborium-typescript = { version = "2.18.0", optional = true }
plotnik-lib.workspace = true
serde-wasm-bindgen = "0.6"
serde_json = "1"
tree-sitter = "0.26.10"
wasm-bindgen = "0.2"

[build-dependencies]
cargo_metadata = "0.23"
plotnik-lib.workspace = true
