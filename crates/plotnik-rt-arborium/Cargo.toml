[package]
name = "plotnik-rt-arborium"
version = "0.4.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/plotnik-lang/plotnik"
description = "Shared runtime engine for Plotnik queries on Arborium"
documentation = "https://docs.rs/plotnik-rt-arborium"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "syntax-tree", "parser"]
categories = ["parsing", "development-tools"]

[lib]
name = "plotnik_rt"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }

[lints.clippy]
unwrap_used = "deny"

[features]
serde = ["dep:serde"]
debug = ["serde", "dep:serde_json"]

[dependencies]
plotnik-rt-core = { path = "../plotnik-rt-core", version = "0.4.0" }
serde = { version = "1.0", optional = true }
serde_json = { version = "1.0", optional = true }
tree-sitter = { package = "arborium-tree-sitter", version = "2.18.0" }
