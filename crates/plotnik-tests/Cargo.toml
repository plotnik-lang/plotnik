[package]
name = "plotnik-tests"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Workspace-internal integration tests and benchmarks"
publish = false
autotests = false
autobenches = false

[lints]
workspace = true

[dependencies]
plotnik-lib = { workspace = true }
plotnik-rt = { workspace = true, features = ["tree-sitter", "serde"] }
arborium-dart = "2.18.0"
arborium-javascript = "2.18.0"
arborium-typescript = "2.18.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "=1.0.150"
tree-sitter = "=0.26.10"

[dev-dependencies]
plotnik = { path = "../plotnik", features = ["serde"] }
criterion = "=0.8.2"
indoc = "=2.0.7"
proptest = "=1.11.0"
similar = "=3.1.1"
# Vanilla (non-arborium) grammar crates: the macro's grammar resolution must
# work against any package shipping a grammar.json, these two prove it —
# typescript also pins the multi-grammar (`pkg/sub`) selection.
tree-sitter-javascript = "=0.25.0"
tree-sitter-typescript = "=0.23.2"
trybuild = "=1.0.117"

[build-dependencies]
cargo_metadata = "=0.23.1"

[[test]]
name = "snapshots"
path = "tests/mod.rs"

[[test]]
name = "fuzz_no_panic"
path = "tests/fuzz_no_panic.rs"

[[test]]
name = "vm_stats"
path = "tests/vm_stats.rs"

[[test]]
name = "stack_safety"
path = "tests/stack_safety.rs"

[[test]]
name = "tree_json"
path = "tests/tree_json.rs"

[[test]]
name = "macro_tests"
path = "tests/macro_tests.rs"

[[test]]
name = "macro_diagnostics"
path = "tests/macro_diagnostics.rs"

[[bench]]
name = "vm"
path = "benches/vm.rs"
harness = false

[[bench]]
name = "formatter"
path = "benches/formatter.rs"
harness = false
