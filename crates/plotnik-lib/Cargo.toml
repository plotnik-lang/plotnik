[package]
name = "plotnik-lib"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed query language for tree-sitter AST"
documentation = "https://docs.rs/plotnik-lib"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "ast", "parser"]
categories = ["parsing", "development-tools"]
# The golden-fixture suite owns its own target wiring (`harness = false`), so we
# declare every test target by hand instead of letting Cargo autodiscover them.
autotests = false
# Criterion owns the bench harness, so the bench target is declared by hand too.
autobenches = false

[lints]
workspace = true

[dependencies]
annotate-snippets = "0.12.9"
arborium-tree-sitter = "2.18.0"
bitflags = "2"
crc32fast = "1.4"
indexmap = { version = "2", features = ["serde"] }
log = "0.4"
logos = "0.16.0"
regex-automata = { version = "0.4", features = ["dfa-search"] }
regex-syntax = "0.8"
rowan = "0.16.1"
rustc-hash = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.17"
topological-sort = "0.2"

[features]
default = []

[dev-dependencies]
arborium-dart = "2.18.0"
arborium-javascript = "2.18.0"
arborium-tree-sitter = "2.18.0"
arborium-typescript = "2.18.0"
cargo_metadata = "=0.23.1"
criterion = "=0.8.2"
insta = { version = "=1.48.0", features = ["yaml"] }
indoc = "=2.0.7"
libtest-mimic = "=0.8.2"
proptest = "=1.11.0"
serde_json = "=1.0.150"
similar = "=3.1.1"
tempfile = "=3.27.0"

# Golden-fixture suite: a custom libtest-mimic harness that discovers fixtures at runtime.
[[test]]
name = "snapshots"
path = "tests/mod.rs"
harness = false

# Property safety net: arbitrary query/source never panics or aborts the pipeline.
[[test]]
name = "fuzz_no_panic"
path = "tests/fuzz_no_panic.rs"

# VM hot-path benchmarks over a synthetic corpus (criterion owns the harness).
[[bench]]
name = "vm"
path = "benches/vm.rs"
harness = false
