[package]
name = "plotnik-lib"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed query language for tree-sitter AST"
documentation = "https://docs.rs/plotnik-lib"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "ast", "parser"]
categories = ["parsing", "development-tools"]
# The golden-fixture suite owns its own target wiring (`harness = false`), so we
# declare every test target by hand instead of letting Cargo autodiscover them.
autotests = false

[lints]
workspace = true

[dependencies]
plotnik-bytecode.workspace = true
plotnik-compiler = { path = "../plotnik-compiler", version = "0.3.3", default-features = false }
plotnik-core.workspace = true
plotnik-vm.workspace = true
serde = { version = "1.0", features = ["derive"] }

[features]
default = []

[build-dependencies]
cargo_metadata = "0.23"

[dev-dependencies]
arborium-javascript = "2.18.0"
arborium-tree-sitter = "2.18.0"
insta = { version = "=1.48.0", features = ["yaml"] }
indoc = "=2.0.7"
libtest-mimic = "=0.8.2"
serde_json = "=1.0.150"
similar = "=3.1.1"
tempfile = "=3.27.0"

# Golden-fixture suite: a custom libtest-mimic harness that discovers fixtures at runtime.
[[test]]
name = "snapshots"
path = "tests/mod.rs"
harness = false

# Stack-safety regression for VM backtracking. Standard libtest harness, so it must
# be declared by hand too (autotests = false suppresses autodiscovery).
[[test]]
name = "stack_safety"
path = "tests/stack_safety.rs"
