[package]
name = "plotnik-lib"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed query language for Tree-sitter syntax trees"
documentation = "https://docs.rs/plotnik-lib"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "syntax-tree", "parser"]
categories = ["parsing", "development-tools"]

[lints]
workspace = true

[dependencies]
annotate-snippets = "0.12.9"
bitflags = "2"
crc32fast = "1.4"
indexmap = { version = "2", features = ["serde"] }
log = "0.4"
logos = "0.16.0"
plotnik-rt = { package = "plotnik-rt-core", path = "../plotnik-rt-core", version = "0.4.0" }
plotnik-runtime = { package = "plotnik-rt", path = "../plotnik-rt", version = "0.4.0", optional = true }
regex-automata = { version = "0.4", features = ["dfa-search"] }
regex-syntax = "0.8"
rowan = "0.16.1"
rustc-hash = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
sha2 = "0.10.9"
thiserror = "2.0.17"
topological-sort = "0.2"
tree-sitter = { version = "0.26.10", optional = true }

[features]
default = ["vm"]
# The runtime engine: bytecode execution, materialization, and the tree
# renderers — everything that touches a live tree-sitter tree. Disabling it
# builds the compiler without linking tree-sitter's C runtime.
vm = ["dep:tree-sitter", "dep:plotnik-runtime"]

[dev-dependencies]
insta = { version = "=1.48.0", features = ["yaml"] }
indoc = "=2.0.7"
proptest = "=1.11.0"
serde_json = "=1.0.150"
similar = "=3.1.1"
