[package]
name = "plotnik-rt"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared runtime engine for Plotnik queries"
documentation = "https://docs.rs/plotnik-rt"
readme = "../../README.md"
keywords = ["tree-sitter", "query", "syntax-tree", "parser"]
categories = ["parsing", "development-tools"]

[lints]
workspace = true

[features]
serde = ["dep:serde"]
debug = ["serde", "dep:serde_json"]

[dependencies]
plotnik-rt-core = { workspace = true }
serde = { version = "1.0", optional = true }
serde_json = { version = "1.0", optional = true }
tree-sitter = "0.26.10"
