[package]
name = "plotnik-vm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Runtime VM for executing compiled Plotnik queries"

[lints]
workspace = true

[dependencies]
plotnik-bytecode.workspace = true
plotnik-core.workspace = true
arborium-tree-sitter = "2.18.0"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0.17"

[dev-dependencies]
insta = { version = "=1.48.0", features = ["yaml"] }
arborium-javascript = "2.18.0"
