name: bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

  workflow_call:
    inputs:
      bump:
        required: true
        type: string
    secrets:
      PLOTNIK_PAT:
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install tomato-toml
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: tomato-toml
          locked: true

      - name: Calculate next version
        id: version
        run: |
          current=$(tomato get workspace.package.version Cargo.toml)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) next="$((major + 1)).0.0" ;;
            minor) next="$major.$((minor + 1)).0" ;;
            patch) next="$major.$minor.$((patch + 1))" ;;
          esac
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Bump versions
        run: |
          next="${{ steps.version.outputs.next }}"
          tomato set workspace.package.version "$next" Cargo.toml
          tomato set workspace.dependencies.plotnik-lib.version "$next" Cargo.toml
          tomato set workspace.dependencies.plotnik-rt.version "$next" Cargo.toml
          # explicit path+version dependencies (default-features / feature overrides
          # that can't inherit from the workspace) need local version bumps too
          tomato set dependencies.plotnik-lib.version "$next" crates/plotnik-cli/Cargo.toml
          tomato set build-dependencies.plotnik-lib.version "$next" crates/plotnik-cli/Cargo.toml
          tomato set dependencies.plotnik-lib.version "$next" crates/plotnik-macros/Cargo.toml
          tomato set dependencies.plotnik-macros.version "$next" crates/plotnik/Cargo.toml
          tomato set dependencies.plotnik-rt.version "$next" crates/plotnik/Cargo.toml

      - name: Update lockfile
        run: cargo check --workspace

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PLOTNIK_PAT }}
        run: |
          next="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "bump/v$next"
          git add Cargo.toml Cargo.lock crates/plotnik-cli/Cargo.toml crates/plotnik-macros/Cargo.toml crates/plotnik/Cargo.toml
          git commit -m "chore: Bump version to \`$next\`"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git push -u origin "bump/v$next"
          gh pr create \
            --title "chore: Bump version to \`$next\`" \
            --body "Bump ${{ inputs.bump }} version: \`${{ steps.version.outputs.current }}\` → \`$next\`"
          gh pr merge --auto --squash
