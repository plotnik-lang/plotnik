name: stable

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-stable
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Clippy
        run: make clippy

      - name: Test
        run: make test

  arborium:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-arborium
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Arborium smoke test
        run: make test-arborium

  codegen-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-codegen
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Generate Rust snapshot tests
        run: make codegen-rust

      - name: Lint generated Rust
        run: make lint-codegen-rust

      - name: Test generated Rust
        run: make test-codegen-rust

  feature-flags:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-stable
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: No-default-features langs
        run: cargo clippy -p plotnik-cli --no-default-features -- -D warnings

      - name: No-default-features lib (C-free compiler)
        run: cargo clippy -p plotnik-lib --no-default-features --all-targets -- -D warnings

      - name: Runtime without debug
        run: |
          cargo check -p plotnik-rt
          cargo check -p plotnik-rt --no-default-features

      - name: Single non-default language
        run: cargo check -p plotnik-cli --no-default-features --features lang-styx

      - name: All-features workspace
        run: cargo check --workspace --all-targets --all-features

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LLVM_PREFIX: /usr/lib/llvm-18
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-wasm
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check wasm
        run: make check-wasm
