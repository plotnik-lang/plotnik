name: stable

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-stable
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-nextest

      - name: Clippy
        run: make clippy

      - name: Test
        run: make test

  feature-flags:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-stable
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: No-default-features langs
        run: cargo clippy -p plotnik-cli --no-default-features -- -D warnings

      - name: No-default-features lib (C-free compiler)
        run: cargo clippy -p plotnik-lib --no-default-features --all-targets -- -D warnings

      - name: Single non-default language
        run: cargo check -p plotnik-cli --no-default-features --features lang-styx

      - name: All-features workspace
        run: cargo check --workspace --all-targets --all-features

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LLVM_PREFIX: /usr/lib/llvm-18
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18

      - name: Using Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          cache-on-failure: "true"
          prefix-key: v0-rust-wasm
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check wasm
        run: make check-wasm
